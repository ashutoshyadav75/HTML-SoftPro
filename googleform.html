<html>
<head>
    <style>
#outer
{
height:1000px;
width:1000px;
border:1px solid;
background-color:yellow;
}
     
body
{
margin:0;
padding:0;
text-align:center;
background-color:red;
}
.logo{
margin-top:15px;
font-size:42px;
font-weight:normal;
background-color:white;
 }

        //.logo .b{color:blue;}
       // .logo .r{color:red;}
      //  .logo .y{color:gold;}
      //  .logo .g{color:green;}
h1{
margin-top:20px;
 font-size:28px;
 color:grey;
 background-color:green;
}

h3{
font-size:18px;
margin-top:15px;
background-color:white;
}

.login-box{
height:260px;
width:320px;
background:lightgrey;
margin:30px 300px 30px 300px;
padding: 100px 25 10px 25px;
box-shadow:0 0 5px gray;
}

input[type="text"],
        input[type="password"]{
            width:250px;
            padding:8px;
            margin:8px 0;
            border:1px solid #aaa;
        }

        .btn{
            width:260px;
            padding:8px;
            margin-top:10px;
            background:#1a73e8;
            color:white;
            border:none;
            font-size:16px;
            border-radius:2px;
            cursor:pointer;
        }

        .options{
            width:260px;
            margin:15px auto;
            display:flex;
            justify-content:space-between;
            font-size:14px;
        }

        .options a{
            text-decoration:none;
            color:purple;
        }

        .create{
            margin-top:15px;
        }

        .create a{
            text-decoration:none;
            color:purple;
        }

        .footer{
            margin-top:10px;
            font-size:16px;
        }
    </style>
</head>

<body>
<div id="outer">
    <div class="logo">
        <span class="b">G</span><span class="r">o</span><span class="y">o</span>
        <span class="b">g</span><span class="g">l</span><span class="r">e</span>
    </div>

    <h1>One account. All of Google.</h1>

    <h3>Sign in to Continue to Gmail</h3>

    <div class="login-box">

        <input type="text"><br>

        <input type="password"><br>

        <button class="btn">Sign in</button>

        <div class="options">
            <label>
                <input type="checkbox"> Stay signed in
            </label>

            <a href="#">Need Help?</a>
        </div>

    </div>

    <div class="create">
        <a href="#">Create an account</a>
    </div>

    <div class="footer">
        One Google Account for everything Google
    </div>
</div>
</body>
</html>
